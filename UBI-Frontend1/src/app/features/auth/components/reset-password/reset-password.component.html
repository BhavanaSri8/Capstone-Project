<div class="min-h-screen bg-no-repeat flex items-center justify-center p-4 auth-bg">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-6">
                <img src="/logo.png" alt="DriveIQ Logo" class="h-12 w-auto object-contain" />
                <span class="text-3xl font-extrabold tracking-tight text-slate-900">DriveIQ</span>
            </div>
            <h1 class="text-xl font-semibold text-slate-900">Set New Password</h1>
            <p class="text-sm text-slate-500 mt-1">Please enter your new password below.</p>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="mb-4 p-3 rounded-lg border flex items-start gap-2" 
                     [ngClass]="isError ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'"
                     *ngIf="message">
                    <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              [attr.d]="isError ? 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'" />
                    </svg>
                    <p class="text-sm">{{ message }}</p>
                </div>

                <form (ngSubmit)="onSubmit()" #resetForm="ngForm" novalidate *ngIf="!isSuccess">
                    <div class="mb-4">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" 
                               required minlength="6" class="form-input" placeholder="Min. 6 characters">
                    </div>

                    <div class="mb-6">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" 
                               required class="form-input" placeholder="Confirm your new password" #confirmModel="ngModel">
                        <div class="form-error" *ngIf="newPassword !== confirmPassword && confirmModel.touched">
                            Passwords do not match.
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full flex items-center justify-center gap-2" 
                            [disabled]="resetForm.invalid || newPassword !== confirmPassword || isLoading">
                        <span *ngIf="!isLoading">Reset Password</span>
                        <div *ngIf="isLoading" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                    </button>
                </form>

                <div *ngIf="isSuccess" class="text-center py-4">
                    <div class="bg-green-100 text-green-700 p-4 rounded-full inline-flex mb-4">
                        <svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <p class="text-slate-500 mb-6">Your password has been reset successfully.</p>
                    <a routerLink="/login" class="btn-primary w-full inline-block">Proceed to Login</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-6" *ngIf="!isSuccess">
            <a routerLink="/login" class="text-sm font-medium text-blue-700 hover:text-blue-800 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Login
            </a>
        </div>
    </div>
</div>
