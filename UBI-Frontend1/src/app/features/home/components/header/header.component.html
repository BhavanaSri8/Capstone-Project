<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      
      <div class="flex-shrink-0">
        <a (click)="navigateTo('/')" class="flex items-center cursor-pointer group">
          <img src="/logo.png" alt="DriveIQ Logo" class="w-10 h-10 object-contain group-hover:shadow-lg transition-shadow" />
          <span class="ml-2 text-xl font-bold text-[#1A1A1A]">DriveIQ</span>
        </a>
      </div>

      
      <nav class="hidden md:flex space-x-8">
        <a (click)="navigateTo('/')" class="text-[#6B6B6B] hover:text-[#75013F] transition-colors cursor-pointer font-medium">Home</a>
        <a (click)="scrollToSection('about')" class="text-[#6B6B6B] hover:text-[#75013F] transition-colors cursor-pointer font-medium">About</a>
        <a (click)="scrollToSection('services')" class="text-[#6B6B6B] hover:text-[#75013F] transition-colors cursor-pointer font-medium">Services</a>
        <a (click)="scrollToSection('coverage')" class="text-[#6B6B6B] hover:text-[#75013F] transition-colors cursor-pointer font-medium">Coverage</a>
        <a (click)="scrollToSection('contact')" class="text-[#6B6B6B] hover:text-[#75013F] transition-colors cursor-pointer font-medium">Contact</a>
      </nav>

      
      <div class="hidden md:flex space-x-4">
        <button (click)="navigateTo('/login')" class="px-4 py-2 text-[#75013F] font-medium hover:text-[#5E0132] transition-colors border border-[#75013F] rounded-lg hover:bg-[#FDE7EF]">
          Login
        </button>
        <button (click)="navigateTo('/register')" class="px-4 py-2 bg-[#75013F] text-white font-medium rounded-lg hover:bg-[#5E0132] transition-colors shadow-md hover:shadow-lg">
          Register
        </button>
      </div>

      
      <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-md text-slate-700 hover:bg-slate-100">
        <svg class="w-6 h-6" [ngClass]="{ 'rotate-90': mobileMenuOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    
    <nav *ngIf="mobileMenuOpen" class="md:hidden pb-4 space-y-2">
      <a (click)="navigateTo('/')" class="block px-3 py-2 text-[#6B6B6B] hover:bg-[#F5F5F5] rounded-md transition-colors cursor-pointer">Home</a>
      <a (click)="scrollToSection('about')" class="block px-3 py-2 text-[#6B6B6B] hover:bg-[#F5F5F5] rounded-md transition-colors cursor-pointer">About</a>
      <a (click)="scrollToSection('services')" class="block px-3 py-2 text-[#6B6B6B] hover:bg-[#F5F5F5] rounded-md transition-colors cursor-pointer">Services</a>
      <a (click)="scrollToSection('coverage')" class="block px-3 py-2 text-[#6B6B6B] hover:bg-[#F5F5F5] rounded-md transition-colors cursor-pointer">Coverage</a>
      <a (click)="scrollToSection('contact')" class="block px-3 py-2 text-[#6B6B6B] hover:bg-[#F5F5F5] rounded-md transition-colors cursor-pointer">Contact</a>
      <div class="pt-2 space-y-2">
        <button (click)="navigateTo('/login')" class="w-full px-3 py-2 text-[#75013F] font-medium border border-[#75013F] rounded-lg hover:bg-[#FDE7EF] transition-colors">
          Login
        </button>
        <button (click)="navigateTo('/register')" class="w-full px-3 py-2 bg-[#75013F] text-white font-medium rounded-lg hover:bg-[#5E0132] transition-colors">
          Register
        </button>
      </div>
    </nav>
  </div>
</header>
