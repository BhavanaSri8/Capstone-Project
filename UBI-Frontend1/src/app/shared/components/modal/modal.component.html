@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40" (click)="onClose()"></div>
    <div class="relative bg-white rounded-lg shadow-xl w-full border border-slate-200 flex flex-col max-h-[90vh]"
         [ngClass]="sizeClass">
      
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 flex-shrink-0">
        <h3 class="text-base font-semibold text-slate-900">{{ title }}</h3>
        <button (click)="onClose()" class="p-1 rounded hover:bg-slate-100 transition-colors">
          <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      
      <div class="px-6 py-4 overflow-y-auto flex-1">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
