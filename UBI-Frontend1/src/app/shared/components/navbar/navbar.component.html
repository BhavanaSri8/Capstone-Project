<header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 sticky top-0 z-30">
    
    <div class="flex items-center gap-4">
        <a [routerLink]="dashboardRoute" class="flex items-center gap-2.5">
            <img src="/logo.png" alt="DriveIQ Logo" class="w-8 h-8 object-contain" />
            <span class="text-lg font-bold text-slate-900">DriveIQ</span>
        </a>
    </div>

    
    @if (currentUser) {
    <div class="flex items-center gap-4">
        
        <span class="hidden md:block text-xs text-slate-400">{{ currentTime | date:'hh:mm a, MMM d' }}</span>
        
        <app-notifications></app-notifications>

        <div class="h-6 w-px bg-slate-200"></div>

        
        <div class="relative">
            <button (click)="showUserMenu = !showUserMenu"
                class="flex items-center gap-2.5 px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-200">
                <div class="w-7 h-7 rounded-full bg-[#FFF1F7] flex items-center justify-center">
                    <span class="text-xs font-semibold text-[#75013F]">{{ currentUser.email[0].toUpperCase() }}</span>
                </div>
                <div class="hidden md:block text-left">
                    <p class="text-sm font-medium text-slate-900 leading-none">{{ currentUser.email }}</p>
                    <p class="text-xs text-slate-500 mt-0.5">{{ roleLabel }}</p>
                </div>
                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            
            @if (showUserMenu) {
            <div class="absolute right-0 mt-1 w-48 bg-white rounded-lg border border-slate-200 shadow-lg py-1 z-50"
                (clickOutside)="showUserMenu = false">
                <div class="px-4 py-3 border-b border-slate-100">
                    <p class="text-xs text-slate-500">Signed in as</p>
                    <p class="text-sm font-medium text-slate-900 truncate">{{ currentUser.email }}</p>
                    <span
                        class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-[#FFF1F7] text-[#75013F] mt-1">{{
                        currentUser.role }}</span>
                </div>
                <a routerLink="/profile" (click)="showUserMenu = false"
                    class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Profile
                </a>
                <button (click)="logout()"
                    class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Sign Out
                </button>
            </div>
            }
        </div>
    </div>
    }
</header>
