<div class="flex justify-center items-center" [class.p-8]="!compact">
  <div class="relative">
    <div class="animate-spin rounded-full border-b-2 border-[#75013F]"
         [ngClass]="compact ? 'h-5 w-5' : 'h-10 w-10'"></div>
  </div>
  @if (message && !compact) {
    <p class="ml-3 text-sm text-slate-500">{{ message }}</p>
  }
</div>
