<div class="card p-5">
  <div class="flex items-start justify-between">
    <div class="flex-1 min-w-0">
      <p class="text-sm font-medium text-slate-500 truncate">{{ label }}</p>
      <p class="mt-1 text-2xl font-semibold text-slate-900">{{ value }}</p>
      @if (sublabel) {
        <p class="mt-1 text-xs text-slate-400">{{ sublabel }}</p>
      }
    </div>
    @if (icon) {
      <div class="ml-3 shrink-0 w-10 h-10 rounded-lg flex items-center justify-center"
           [class]="iconBgClass">
        <span class="text-xl">{{ icon }}</span>
      </div>
    }
  </div>
  @if (trend !== null) {
    <div class="mt-3 flex items-center gap-1">
      @if (trend >= 0) {
        <svg class="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
        </svg>
        <span class="text-xs font-medium text-emerald-600">{{ trend }}% this month</span>
      } @else {
        <svg class="w-3.5 h-3.5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
        </svg>
        <span class="text-xs font-medium text-red-500">{{ trend }}% this month</span>
      }
    </div>
  }
</div>
